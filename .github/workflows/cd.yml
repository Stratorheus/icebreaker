# CD: build and deploy to Fly.io + itch.io after merge to main
# Tests already passed via PR workflow — this only builds and deploys.
name: CD

on:
  push:
    branches:
      - main

jobs:
  deploy-fly:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    concurrency: deploy-group
    steps:
      - uses: actions/checkout@v6
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-itch:
    name: Deploy to itch.io
    runs-on: ubuntu-latest
    needs: deploy-fly
    if: ${{ vars.ITCH_ENABLED == 'true' }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Install butler
        run: |
          curl -L -o butler.zip https://broth.itch.zone/butler/linux-amd64/LATEST/archive/default
          unzip butler.zip
          chmod +x butler
          ./butler -V

      - name: Push to itch.io
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          ./butler push dist Stratorheus/icebreaker:html5 --userversion "$VERSION"
