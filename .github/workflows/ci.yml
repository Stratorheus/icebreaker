# CI: fast checks on every push to feature branches
name: CI

on:
  push:
    branches-ignore:
      - main

jobs:
  ci:
    name: Typecheck & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm test
