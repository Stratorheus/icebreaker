# PR: full test suite before merge to main
name: PR

on:
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Typecheck, Unit Tests & E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm test
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
